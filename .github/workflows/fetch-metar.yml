name: Fetch METAR

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分おきに実行
  workflow_dispatch:           # 手動実行も可能
  push:
    branches: [main]
    paths-ignore:
      - 'metar.json'           # metar.jsonの自動コミットでは再実行しない

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch METAR data
        run: python .github/scripts/fetch_metar.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metar.json
          git diff --staged --quiet || git commit -m "chore: update METAR [skip ci]"
          git push
